spring:
  application:
    name: order-service
  profiles:
    active: dev

  # JPA Configuration
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  # Kafka Configuration for Event-Driven Architecture
  kafka:
    # Kafka bootstrap servers
    bootstrap-servers: localhost:9092

    # Producer Configuration
    producer:
      # Key serializer - Order ID as String
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Value serializer - JSON for events
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Acknowledgment mode: all (wait for all replicas)
      acks: all
      # Enable idempotence to avoid duplicates
      enable-idempotence: true
      # Compression type: snappy for balance between speed and compression
      compression-type: snappy
      # Batch size in bytes
      batch-size: 16384
      # Linger time in milliseconds (wait before sending batch)
      linger-ms: 10
      # Buffer size in bytes
      buffer-memory: 33554432
      # Retries
      retries: 3

    # Consumer Configuration
    consumer:
      # Key deserializer - Order ID as String
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Value deserializer - JSON for events
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      # Consumer group ID
      group-id: order-service-group
      # Auto offset reset: earliest (start from beginning if no offset)
      auto-offset-reset: earliest
      # Enable auto commit
      enable-auto-commit: true
      # Auto commit interval in milliseconds
      auto-commit-interval-ms: 1000
      # Trusted packages for JSON deserialization
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "event:com.order.infrastructure.kafka.event"

    # Listener Configuration
    listener:
      # Concurrency: number of threads for listener
      concurrency: 3
      # Auto startup
      auto-startup: true
      # Ack mode: manual_immediate (manual ack after processing)
      ack-mode: manual_immediate

    # Topic Configuration - Custom properties
    topics:
      # Order Events Topic
      order:
        name: order-events
        partitions: 3
        replication-factor: 1
      # Payment Events Topic (for consuming payment responses)
      payment:
        name: payment-events
        partitions: 3
        replication-factor: 1
      # Dead Letter Topic for failed events
      dead-letter:
        name: order-events-dlt
        partitions: 1
        replication-factor: 1

# Server Configuration
server:
  port: 8082
  servlet:
    context-path: /order-service

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: primary

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      cmsService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      cmsService:
        max-attempts: 3
        wait-duration: 1000

# SpringDoc Configuration
springdoc:
  api-docs:
    enabled: true
    path: /order-service/api-docs
  swagger-ui:
    enabled: true
    path: /order-service/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Service URLs Configuration
# Lưu ý: Trong production, các URL này nên được cấu hình qua environment variables hoặc config server
cms-service:
  name: cms-service
  url: http://localhost:8081

payment-service:
  url: http://localhost:8083

# Logging Configuration
logging:
  level:
    root: INFO
    com.order: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,kafka
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Info Configuration
info:
  app:
    name: ${spring.application.name}
    description: Order Service - Event-Driven Microservice
    version: 1.0.0
    architecture: event-driven
