spring:
  application:
    name: cms-service
  profiles:
    active: dev
  h2:
    console:
      enabled: false
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

server:
  port: 8081
  servlet:
    context-path: /cms-service

# JWT Configuration
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    enabled: true
    path: /cms-service/api-docs
  swagger-ui:
    enabled: true
    path: /cms-service/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
