spring:
  application:
    name: order-service
  profiles:
    active: dev
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

server:
  port: 8082
  servlet:
    context-path: /order-service

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: primary

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      cmsService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      cmsService:
        max-attempts: 3
        wait-duration: 1000

springdoc:
  api-docs:
    enabled: true
    path: /order-service/api-docs
  swagger-ui:
    enabled: true
    path: /order-service/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# CMS Service Configuration (for Feign client)
cms-service:
  name: cms-service
  url: http://localhost:8081

# JWT Configuration
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000
  refresh-expiration: 604800000

# Payment Service Configuration
payment-service:
  url: http://localhost:8083
