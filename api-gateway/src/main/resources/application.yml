server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Cấu hình routes cho các microservices
      routes:
        # Auth Service Route (Port 8084)
        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # CMS Service Route (Port 8081)
        - id: cms-service
          uri: http://localhost:8081
          predicates:
            - Path=/cms/**
          filters:
            - StripPrefix=1
            - AuthorizeFilter

        # Order Service Route (Port 8082)
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1
            - AuthorizeFilter

        # Payment Service Route (Port 8083)
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=1
            - AuthorizeFilter

      # Cấu hình mặc định cho tất cả routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # Cấu hình CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# Cấu hình JWT Secret Key
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000  # 24 giờ (milliseconds)

# Cấu hình Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Cấu hình Custom Gateway Properties (excluded paths, etc.)
custom:
  gateway:
    test:
      enabled: false
    excluded-paths:
      enabled: true
      paths:
        - /health
        - /actuator/**
        - /public/**
        - /auth/login
        - /auth/register
        - /auth/refresh-token
        - /auth/actuator/**
        - /auth/swagger-ui/**
        - /auth/api-docs/**

# Cấu hình Logging
logging:
  level:
    root: INFO
    com.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Cấu hình thông tin ứng dụng
info:
  app:
    name: ${spring.application.name}
    description: API Gateway cho hệ thống Microservices
    version: 1.0.0
