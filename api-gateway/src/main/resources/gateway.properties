# Gateway Configuration Properties
# File này được dùng để override default values nếu cần

# Test Configuration
# Chỉ enable trong development环境
gateway.test.enabled=false

# Excluded Paths (Paths không cần authentication)
# Format: comma-separated paths
gateway.excluded-paths.paths=/health,/actuator/**,/public/**

# JWT Configuration (thường set qua environment variable trong production)
# jwt.secret=${JWT_SECRET}
# jwt.expiration=${JWT_EXPIRATION}

# Service URLs
# gateway.services.cms.url=http://localhost:8081
# gateway.services.order.url=http://localhost:8082
# gateway.services.payment.url=http://localhost:8083
